<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Heard | Lexi Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .editor-word { cursor: pointer; border-radius: 4px; padding: 0 3px; transition: 0.2s; display: inline-block; }
        .editor-word.is-bold { font-weight: 800; color: #1e40af; background-color: #fef08a; text-decoration: underline; }
        .drop-zone { border: 2px dashed #cbd5e1; min-width: 140px; display: inline-block; height: 2em; vertical-align: middle; margin: 0 6px; border-radius: 8px; background: #f1f5f9; text-align: center; transition: all 0.3s; padding: 2px 10px; }
        .draggable-item { cursor: grab; padding: 8px 18px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; font-weight: 700; font-size: 0.9rem; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 800; }
        .choice-btn { transition: all 0.2s; border: 2px solid #e2e8f0; }
        .choice-btn.correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .choice-btn.wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .ultra-container { max-width: 1400px; margin: 0 auto; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- NAVIGATION -->
    <nav class="bg-white border-b sticky top-0 z-[100] px-8 h-16 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-xl">V</div>
                <span class="text-xl font-black text-slate-800 tracking-tighter">BeHeard <span class="text-indigo-600">LexiLearning</span></span>
            </div>
            <div id="mainTabs" class="hidden flex gap-6 h-16 items-center text-sm font-bold text-slate-500">
                <button onclick="switchTab('creator')" class="tab-btn tab-active h-full px-2" data-tab="creator">SOẠN BÀI</button>
                <button onclick="switchTab('library')" class="tab-btn h-full px-2" data-tab="library">THƯ VIỆN</button>
                <button onclick="switchTab('review')" class="tab-btn h-full px-2" data-tab="review">ÔN TẬP</button>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
                <input type="password" id="apiKey" class="text-xs bg-transparent border-none rounded-lg px-3 py-2 w-40 outline-none" placeholder="Gemini API Key...">
                <button id="saveKeyBtn" class="bg-white text-indigo-600 p-2 rounded-lg shadow-sm hover:bg-indigo-50 transition" title="Lưu Key">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                </button>
            </div>
            <div id="authArea">
                <button id="loginBtn" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-indigo-600 transition">Đăng nhập</button>
                <div id="userProfile" class="hidden flex items-center gap-3">
                    <img id="userAvatar" class="w-8 h-8 rounded-full border border-slate-200">
                    <button id="logoutBtn" class="text-xs font-bold text-red-500 hover:underline">Thoát</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="ultra-container p-6">
        
        <!-- SECTION 1: CREATOR -->
        <div id="tab-creator" class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div class="xl:col-span-7 space-y-6">
                <section class="bg-white rounded-2xl shadow-sm border p-6">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Nguồn bài học</span>
                        <input type="file" id="fileInput" class="hidden" accept=".docx">
                        <button onclick="document.getElementById('fileInput').click()" class="text-indigo-600 text-xs font-bold">📂 Tải tài liệu .docx</button>
                    </div>
                    <textarea id="rawInput" class="w-full h-32 p-4 bg-slate-50 rounded-xl focus:outline-none resize-none text-slate-600" placeholder="Dán văn bản tiếng Anh vào đây..."></textarea>
                    <button id="loadBtn" class="w-full mt-4 bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-indigo-600 transition">Hiển thị nội dung</button>
                </section>

                <section class="bg-white rounded-2xl shadow-sm border min-h-[400px] flex flex-col overflow-hidden">
                    <div id="editor" class="flex-grow p-8 text-xl leading-[1.8] text-slate-700"></div>
                    <div class="p-6 bg-indigo-600 flex justify-between items-center">
                        <span class="text-white text-xs">Double-click để chọn từ khó</span>
                        <button id="generateBtn" class="bg-white text-indigo-600 px-8 py-3 rounded-xl font-black shadow-lg">PHÂN TÍCH AI</button>
                    </div>
                </section>
            </div>

            <div class="xl:col-span-5 space-y-6">
                <div id="vocabContainer" class="hidden bg-white rounded-2xl shadow-md border overflow-hidden flex flex-col h-[700px]">
                    <div class="p-5 border-b flex justify-between items-center">
                        <h3 class="font-black text-slate-800">DANH SÁCH TỪ VỰNG</h3>
                        <button id="downloadBtn" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-xs font-bold">Tải CSV</button>
                    </div>
                    <div id="vocabList" class="flex-grow overflow-y-auto p-4 space-y-4 bg-slate-50/50"></div>
                    <div class="p-5 bg-white border-t">
                        <button id="showDragDropBtn" class="w-full py-4 bg-emerald-500 text-white rounded-xl font-black">TẠO BÀI TẬP KÉO THẢ</button>
                    </div>
                </div>

                <!-- Kéo thả -->
                <div id="dragDropContainer" class="hidden bg-slate-900 rounded-3xl shadow-2xl flex flex-col h-[700px] overflow-hidden">
                    <div class="p-6 border-b border-slate-800 flex justify-between items-center text-emerald-400">
                        <span class="font-black italic">PRACTICE MODE</span>
                        <button onclick="closeDragDrop()" class="text-slate-500 hover:text-white">✕</button>
                    </div>
                    <div id="wordBank" class="p-4 bg-slate-800/50 border-b border-slate-800">
                        <div id="draggableContainer" class="flex flex-wrap gap-2 justify-center"></div>
                    </div>
                    <div class="flex-grow overflow-y-auto p-8 space-y-8" id="quizSentences"></div>
                    <div class="p-6 bg-slate-900 border-t border-slate-800">
                        <div id="dragDropScore" class="mb-4"></div>
                        <button id="checkDragDropBtn" class="w-full py-4 bg-emerald-500 text-white rounded-xl font-black transition">KIỂM TRA ĐÁP ÁN</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SECTION 2: LIBRARY -->
        <div id="tab-library" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                <h2 class="text-3xl font-black text-slate-800 mb-6">Thư viện của tôi</h2>
                <div id="libraryStats" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10"></div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-slate-400 text-xs border-b">
                                <th class="py-4 px-4">Từ vựng</th>
                                <th class="py-4 px-4">Định nghĩa</th>
                                <th class="py-4 px-4">Tiến độ</th>
                                <th class="py-4 px-4 text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="libraryTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- SECTION 3: REVIEW -->
        <div id="tab-review" class="hidden max-w-2xl mx-auto py-10">
            <div id="reviewStart" class="text-center space-y-6 bg-white p-12 rounded-3xl border shadow-sm">
                <div class="text-5xl">🎯</div>
                <h2 class="text-3xl font-black text-slate-800">Ôn tập trắc nghiệm</h2>
                <p class="text-slate-500">Hệ thống chọn những từ bạn hay sai hoặc chưa thuộc để đố.</p>
                <button onclick="startReviewQuiz()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl">BẮT ĐẦU NGAY</button>
            </div>

            <div id="reviewQuizArea" class="hidden space-y-6">
                <div class="bg-white p-10 rounded-3xl border shadow-xl text-center relative overflow-hidden">
                    <div id="feedbackOverlay" class="hidden absolute inset-x-0 top-0 py-2 font-black text-sm uppercase tracking-widest"></div>
                    <span id="qIpa" class="text-slate-400 font-mono text-lg block mb-2 mt-4">/ /</span>
                    <h1 id="qWord" class="text-5xl font-black text-slate-900 mb-10 tracking-tight">Word</h1>
                    <div id="qChoices" class="grid grid-cols-1 gap-3"></div>
                    <button id="nextReviewBtn" class="hidden mt-8 w-full py-4 bg-slate-900 text-white rounded-xl font-bold transition">Câu tiếp theo ➜</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // 1. FIREBASE CONFIG (Dán của bạn vào đây)
        const firebaseConfig = {
    apiKey: "AIzaSyAf87waidSGWoxESPDaQ9ViihIvFrVZ_4k",
    authDomain: "lexi-learning-with-be-heard.firebaseapp.com",
    projectId: "lexi-learning-with-be-heard",
    storageBucket: "lexi-learning-with-be-heard.firebasestorage.app",
    messagingSenderId: "605323183988",
    appId: "1:605323183988:web:f747eb66de0062d46b0e21",
    measurementId: "G-FDMB8DCZ0S"
  };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let learningData = [];
        let reviewPool = [];
        let currentReviewIdx = 0;

        // 2. API KEY PERSISTENCE
        window.addEventListener('load', () => {
            const savedKey = localStorage.getItem('vflow_api_key');
            if(savedKey) document.getElementById('apiKey').value = savedKey;
        });

        document.getElementById('saveKeyBtn').onclick = () => {
            const key = document.getElementById('apiKey').value.trim();
            localStorage.setItem('vflow_api_key', key);
            alert("Đã lưu API Key thành công!");
        };

        // 3. AUTH & TABS
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userAvatar').src = user.photoURL;
                document.getElementById('mainTabs').classList.remove('hidden');
                loadLibrary();
            } else {
                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('userProfile').classList.add('hidden');
                document.getElementById('mainTabs').classList.add('hidden');
                switchTab('creator');
            }
        });

        document.getElementById('loginBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        document.getElementById('logoutBtn').onclick = () => auth.signOut();

        function switchTab(tabName) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
                if(btn.dataset.tab === tabName) btn.classList.add('tab-active');
            });
            if(tabName === 'library') loadLibrary();
        }

        // 4. CREATOR LOGIC
        document.getElementById('loadBtn').onclick = () => {
            const text = document.getElementById('rawInput').value.trim();
            if(!text) return;
            document.getElementById('editor').innerHTML = text.split(/(\s+)/).map(w => 
                w.trim() === '' ? w : `<span class="editor-word" ondblclick="this.classList.toggle('is-bold')">${w}</span>`
            ).join('');
        };

        document.getElementById('generateBtn').onclick = async () => {
            const key = document.getElementById('apiKey').value.trim();
            if(!key) return alert("Vui lòng nhập API Key!");
            
            const selected = Array.from(new Set(Array.from(document.querySelectorAll('.is-bold')).map(el => 
                el.innerText.trim().replace(/[^a-zA-Z-]/g, '')
            ))).filter(w => w.length > 1);

            if(selected.length === 0) return alert("Hãy chọn từ bằng cách double-click!");

            document.getElementById('vocabContainer').classList.remove('hidden');
            document.getElementById('vocabList').innerHTML = '<p class="text-center py-10 text-indigo-500 animate-pulse">AI đang phân tích...</p>';
            
            const prompt = `Return a JSON array for: [${selected.join(', ')}]. JSON structure: {"word": "string", "ipa": "string", "vn": "tiếng Việt", "level": "A1-C2", "example": "English sentence"}.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const resText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                learningData = JSON.parse(resText);
                renderVocabList();
                saveVocabToDb(learningData);
            } catch (e) { alert("Lỗi kết nối AI. Hãy kiểm tra Key hoặc mạng."); }
        };

        function renderVocabList() {
            document.getElementById('vocabList').innerHTML = learningData.map(item => `
                <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center"><span class="font-black text-slate-800">${item.word}</span><span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded font-bold">${item.level}</span></div>
                    <p class="text-xs text-slate-400 font-mono">${item.ipa}</p>
                    <p class="text-sm font-bold text-indigo-600 mt-1">${item.vn}</p>
                </div>
            `).join('');
        }

        async function saveVocabToDb(data) {
            if(!currentUser) return;
            const batch = db.batch();
            data.forEach(item => {
                const ref = db.collection('users').doc(currentUser.uid).collection('vocabulary').doc(item.word.toLowerCase());
                batch.set(ref, {
                    ...item,
                    correct_count: firebase.firestore.FieldValue.increment(0),
                    incorrect_count: firebase.firestore.FieldValue.increment(0),
                    last_updated: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            });
            await batch.commit();
        }

        // 5. LIBRARY & DELETE
        async function loadLibrary() {
            if(!currentUser) return;
            const snap = await db.collection('users').doc(currentUser.uid).collection('vocabulary').get();
            const list = snap.docs.map(doc => doc.data());
            
            document.getElementById('libraryTableBody').innerHTML = list.map(item => `
                <tr class="border-b hover:bg-slate-50 transition group">
                    <td class="py-4 px-4 font-black text-slate-800">${item.word}</td>
                    <td class="py-4 px-4 text-sm">${item.vn}</td>
                    <td class="py-4 px-4">
                        <div class="w-24 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-indigo-500" style="width: ${Math.min((item.correct_count || 0) * 10, 100)}%"></div>
                        </div>
                        <span class="text-[10px] text-slate-400 font-bold">${item.correct_count || 0}/10 lần đúng</span>
                    </td>
                    <td class="py-4 px-4 text-center">
                        <button onclick="deleteWord('${item.word}')" class="text-slate-300 hover:text-red-500 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </td>
                </tr>
            `).join('');

            const mastered = list.filter(i => (i.correct_count || 0) >= 10).length;
            document.getElementById('libraryStats').innerHTML = `
                <div class="bg-white p-6 rounded-2xl border text-center"><p class="text-xs font-bold text-slate-400 uppercase">Tổng từ</p><h3 class="text-3xl font-black">${list.length}</h3></div>
                <div class="bg-indigo-50 p-6 rounded-2xl border-indigo-100 border text-center"><p class="text-xs font-bold text-indigo-500 uppercase">Đã thuộc</p><h3 class="text-3xl font-black text-indigo-600">${mastered}</h3></div>
                <div class="bg-slate-50 p-6 rounded-2xl border text-center"><p class="text-xs font-bold text-slate-400 uppercase">Đang học</p><h3 class="text-3xl font-black">${list.length - mastered}</h3></div>
            `;
        }

        async function deleteWord(word) {
            if(!confirm(`Xoá từ "${word}" khỏi thư viện?`)) return;
            await db.collection('users').doc(currentUser.uid).collection('vocabulary').doc(word.toLowerCase()).delete();
            loadLibrary();
        }

        // 6. CSV & DRAG DROP
        document.getElementById('downloadBtn').onclick = () => {
            if(learningData.length === 0) return;
            let csv = "\uFEFFTừ vựng,Phiên âm,Định nghĩa,Cấp độ,Ví dụ\n";
            learningData.forEach(i => csv += `"${i.word}","${i.ipa}","${i.vn}","${i.level}","${i.example.replace(/"/g, '""')}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Be_Heard.csv`;
            link.click();
        };

        document.getElementById('showDragDropBtn').onclick = () => {
            document.getElementById('vocabContainer').classList.add('hidden');
            document.getElementById('dragDropContainer').classList.remove('hidden');
            document.getElementById('dragDropScore').innerHTML = "";
            
            const words = shuffle([...learningData]);
            document.getElementById('draggableContainer').innerHTML = words.map(i => `<div class="draggable-item" draggable="true" ondragstart="event.dataTransfer.setData('text','${i.word}')">${i.word}</div>`).join('');
            
            document.getElementById('quizSentences').innerHTML = shuffle([...learningData]).map((i, idx) => {
                const html = i.example.replace(new RegExp(i.word, 'gi'), `<div class="drop-zone" data-answer="${i.word}"></div>`);
                return `<div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-800 text-slate-300"><span class="text-slate-600 font-black mr-2">${idx+1}.</span>${html}</div>`;
            }).join('');
            
            document.querySelectorAll('.drop-zone').forEach(z => {
                z.ondragover = e => e.preventDefault();
                z.ondrop = e => { e.preventDefault(); z.innerText = e.dataTransfer.getData('text'); z.style.background = "#4338ca"; z.style.color = "white"; z.style.borderColor = "transparent"; };
            });
        };

        document.getElementById('checkDragDropBtn').onclick = () => {
            const zones = document.querySelectorAll('.drop-zone');
            let correct = 0;
            zones.forEach(z => {
                const ok = z.innerText.trim().toLowerCase() === z.dataset.answer.toLowerCase();
                if(ok) { correct++; z.style.background = "#064e3b"; z.style.borderColor = "#10b981"; }
                else { z.style.background = "#450a0a"; z.style.borderColor = "#ef4444"; z.innerHTML += ` <span class="text-[9px] opacity-60">[${z.dataset.answer}]</span>`; }
            });
            const percent = Math.round((correct/zones.length)*100);
            document.getElementById('dragDropScore').innerHTML = `<div class="bg-white/10 p-4 rounded-xl text-center text-emerald-400 font-bold border border-white/10">KẾT QUẢ: ${correct}/${zones.length} (${percent}%)</div>`;
        };

        // 7. REVIEW LOGIC (IMPROVED FEEDBACK)
        async function startReviewQuiz() {
            const snap = await db.collection('users').doc(currentUser.uid).collection('vocabulary').where('correct_count', '<', 10).limit(10).get();
            reviewPool = shuffle(snap.docs.map(doc => doc.data()));
            if(reviewPool.length < 4) return alert("Cần tối thiểu 4 từ đang học!");
            currentReviewIdx = 0;
            document.getElementById('reviewStart').classList.add('hidden');
            document.getElementById('reviewQuizArea').classList.remove('hidden');
            showReviewQuestion();
        }

        function showReviewQuestion() {
            if(currentReviewIdx >= reviewPool.length) { alert("Xong! Quay lại Thư viện."); return switchTab('library'); }
            
            const target = reviewPool[currentReviewIdx];
            const overlay = document.getElementById('feedbackOverlay');
            overlay.classList.add('hidden');
            document.getElementById('nextReviewBtn').classList.add('hidden');
            document.getElementById('qWord').innerText = target.word;
            document.getElementById('qIpa').innerText = target.ipa;

            const distractors = shuffle(reviewPool.filter(i => i.word !== target.word)).slice(0, 3).map(i => i.vn);
            const choices = shuffle([target.vn, ...distractors]);
            
            document.getElementById('qChoices').innerHTML = choices.map(c => `
                <button onclick="checkReviewAnswer(this, '${c}', '${target.vn}', '${target.word}')" 
                    class="choice-btn p-5 bg-white rounded-2xl font-bold text-slate-700 text-left hover:bg-slate-50">
                    ${c}
                </button>
            `).join('');
        }

        async function checkReviewAnswer(btn, selected, correct, word) {
            const allBtns = document.querySelectorAll('.choice-btn');
            const overlay = document.getElementById('feedbackOverlay');
            const ref = db.collection('users').doc(currentUser.uid).collection('vocabulary').doc(word.toLowerCase());
            
            // Khóa các nút
            allBtns.forEach(b => b.disabled = true);
            
            if(selected === correct) {
                btn.classList.add('correct');
                overlay.innerText = "Chính xác! 🎉";
                overlay.className = "absolute inset-x-0 top-0 py-2 font-black text-sm uppercase tracking-widest bg-emerald-100 text-emerald-600 block";
                await ref.update({ correct_count: firebase.firestore.FieldValue.increment(1) });
            } else {
                btn.classList.add('wrong');
                allBtns.forEach(b => { if(b.innerText.trim() === correct) b.classList.add('correct'); });
                overlay.innerText = "Chưa đúng rồi! ✍️";
                overlay.className = "absolute inset-x-0 top-0 py-2 font-black text-sm uppercase tracking-widest bg-red-100 text-red-600 block";
                await ref.update({ incorrect_count: firebase.firestore.FieldValue.increment(1) });
                // Đưa xuống cuối đố lại
                reviewPool.push(reviewPool.splice(currentReviewIdx, 1)[0]);
                currentReviewIdx--; // Giữ nguyên index vì pool đã thay đổi
            }
            
            document.getElementById('nextReviewBtn').onclick = () => {
                currentReviewIdx++;
                showReviewQuestion();
            };
            document.getElementById('nextReviewBtn').classList.remove('hidden');
        }

        // UTILS
        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
        function closeDragDrop() { document.getElementById('dragDropContainer').classList.add('hidden'); document.getElementById('vocabContainer').classList.remove('hidden'); }
    </script>
</body>
</html>
