<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Heard|Lexi Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .editor-word { cursor: pointer; border-radius: 4px; padding: 0 3px; transition: 0.2s; display: inline-block; }
        .editor-word.is-bold { font-weight: 800; color: #1e40af; background-color: #fef08a; text-decoration: underline; }
        .drop-zone { border: 2px dashed #cbd5e1; min-width: 140px; display: inline-block; height: 2em; vertical-align: middle; margin: 0 6px; border-radius: 8px; background: #f1f5f9; text-align: center; transition: all 0.3s; padding: 2px 10px; }
        .drop-zone:empty::before { content: "Kéo từ vào đây"; color: #94a3b8; font-size: 0.75rem; font-style: italic; }
        .draggable-item { cursor: grab; padding: 8px 18px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; font-weight: 700; font-size: 0.9rem; transition: 0.2s; }
        .draggable-item:hover { border-color: #4f46e5; transform: translateY(-2px); }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 800; }
        .ultra-container { max-width: 1400px; margin: 0 auto; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- NAVIGATION -->
    <nav class="bg-white border-b sticky top-0 z-[100] px-8 h-16 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-xl">V</div>
                <span class="text-xl font-black text-slate-800 tracking-tighter">VocaFlow <span class="text-indigo-600">Pro</span></span>
            </div>
            <div id="mainTabs" class="hidden flex gap-6 h-16 items-center text-sm font-bold text-slate-500">
                <button onclick="switchTab('creator')" class="tab-btn tab-active h-full px-2" data-tab="creator">SOẠN BÀI</button>
                <button onclick="switchTab('library')" class="tab-btn h-full px-2" data-tab="library">THƯ VIỆN</button>
                <button onclick="switchTab('review')" class="tab-btn h-full px-2" data-tab="review">ÔN TẬP</button>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <input type="password" id="apiKey" class="text-xs border border-slate-200 rounded-xl px-4 py-2 w-48 outline-none focus:border-indigo-500 transition-all" placeholder="Gemini API Key...">
            <div id="authArea">
                <button id="loginBtn" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-indigo-600 transition">Đăng nhập Google</button>
                <div id="userProfile" class="hidden flex items-center gap-3">
                    <img id="userAvatar" class="w-8 h-8 rounded-full border border-slate-200">
                    <button id="logoutBtn" class="text-xs font-bold text-red-500 hover:underline">Thoát</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="ultra-container p-6">
        
        <!-- SECTION 1: CREATOR -->
        <div id="tab-creator" class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div class="xl:col-span-7 space-y-6">
                <section class="bg-white rounded-2xl shadow-sm border p-6">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Văn bản nguồn</span>
                        <button onclick="document.getElementById('fileInput').click()" class="text-indigo-600 text-xs font-bold hover:underline">📂 Tải .docx</button>
                        <input type="file" id="fileInput" class="hidden" accept=".docx">
                    </div>
                    <textarea id="rawInput" class="w-full h-32 p-4 bg-slate-50 rounded-xl focus:outline-none resize-none text-slate-600" placeholder="Dán nội dung bài học tiếng Anh..."></textarea>
                    <button id="loadBtn" class="w-full mt-4 bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-indigo-600 transition">Hiển thị nội dung</button>
                </section>

                <section class="bg-white rounded-2xl shadow-sm border min-h-[400px] flex flex-col overflow-hidden">
                    <div id="editor" class="flex-grow p-8 text-xl leading-[1.8] text-slate-700"></div>
                    <div class="p-6 bg-indigo-600 flex justify-between items-center">
                        <span class="text-white text-sm font-medium italic">Double-click từ để chọn trích xuất AI</span>
                        <button id="generateBtn" class="bg-white text-indigo-600 px-8 py-3 rounded-xl font-black shadow-lg hover:scale-105 transition">PHÂN TÍCH AI</button>
                    </div>
                </section>
            </div>

            <div class="xl:col-span-5 space-y-6">
                <!-- Danh sách từ AI trả về -->
                <div id="vocabContainer" class="hidden bg-white rounded-2xl shadow-md border overflow-hidden flex flex-col h-[700px]">
                    <div class="p-5 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                        <h3 class="font-black text-slate-800">TỪ VỰNG TRÍCH XUẤT</h3>
                        <button id="downloadBtn" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-xs font-bold hover:bg-indigo-100">Tải CSV</button>
                    </div>
                    <div id="vocabList" class="flex-grow overflow-y-auto p-4 space-y-4 bg-slate-50/50"></div>
                    <div class="p-5 bg-white border-t">
                        <button id="showDragDropBtn" class="w-full py-4 bg-emerald-500 text-white rounded-xl font-black shadow-lg hover:bg-emerald-600 transition">TẠO BÀI TẬP KÉO THẢ</button>
                    </div>
                </div>

                <!-- Bài tập Kéo thả -->
                <div id="dragDropContainer" class="hidden bg-slate-900 rounded-3xl shadow-2xl flex flex-col h-[700px] overflow-hidden">
                    <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                        <h3 class="text-emerald-400 font-black">DRAG & DROP PRACTICE</h3>
                        <button onclick="closeDragDrop()" class="text-slate-500 hover:text-white">✕</button>
                    </div>
                    <div id="wordBank" class="p-4 bg-slate-800/50 border-b border-slate-800">
                        <div id="draggableContainer" class="flex flex-wrap gap-2 justify-center"></div>
                    </div>
                    <div class="flex-grow overflow-y-auto p-8 space-y-8" id="quizSentences"></div>
                    <div class="p-6 bg-slate-900 border-t border-slate-800 space-y-4">
                        <div id="dragDropScoreDisplay"></div> <!-- Vùng hiện điểm -->
                        <button id="checkDragDropBtn" class="w-full py-4 bg-emerald-500 text-white rounded-xl font-black transition">KIỂM TRA ĐÁP ÁN</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SECTION 2: LIBRARY -->
        <div id="tab-library" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                <h2 class="text-3xl font-black text-slate-800 mb-6">Thư viện cá nhân</h2>
                <div id="libraryStats" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10"></div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-slate-400 text-xs uppercase tracking-widest border-b">
                                <th class="py-4 px-4">Từ vựng</th>
                                <th class="py-4 px-4">Định nghĩa</th>
                                <th class="py-4 px-4">Tiến độ (Đúng/10)</th>
                                <th class="py-4 px-4">Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="libraryTableBody" class="text-slate-600 font-medium"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- SECTION 3: REVIEW -->
        <div id="tab-review" class="hidden max-w-2xl mx-auto py-10">
            <div id="reviewStart" class="text-center space-y-6 bg-white p-12 rounded-3xl border shadow-sm">
                <div class="text-5xl">🎯</div>
                <h2 class="text-3xl font-black text-slate-800">Ôn tập Thông minh</h2>
                <p class="text-slate-500">Hệ thống sẽ đố các từ bạn chưa thuộc (dưới 10 lần đúng) hoặc hay làm sai.</p>
                <button onclick="startReviewQuiz()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl hover:bg-indigo-700 transition">BẮT ĐẦU ÔN TẬP</button>
            </div>

            <div id="reviewQuizArea" class="hidden space-y-8">
                <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                    <div id="reviewProgress" class="h-full bg-indigo-500 transition-all" style="width: 0%"></div>
                </div>
                <div class="bg-white p-10 rounded-3xl border shadow-xl text-center">
                    <span id="qIpa" class="text-slate-400 font-mono text-lg block mb-2">/ /</span>
                    <h1 id="qWord" class="text-5xl font-black text-slate-900 mb-10 tracking-tight">Word</h1>
                    <div id="qChoices" class="grid grid-cols-1 gap-3"></div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // 1. CẤU HÌNH FIREBASE (THAY THẾ TẠI ĐÂY)
        const firebaseConfig = {
    apiKey: "AIzaSyAf87waidSGWoxESPDaQ9ViihIvFrVZ_4k",
    authDomain: "lexi-learning-with-be-heard.firebaseapp.com",
    projectId: "lexi-learning-with-be-heard",
    storageBucket: "lexi-learning-with-be-heard.firebasestorage.app",
    messagingSenderId: "605323183988",
    appId: "1:605323183988:web:f747eb66de0062d46b0e21",
    measurementId: "G-FDMB8DCZ0S"
  };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let learningData = [];
        let reviewPool = [];
        let currentReviewIdx = 0;

        // 2. AUTH LOGIC
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userAvatar').src = user.photoURL;
                document.getElementById('mainTabs').classList.remove('hidden');
                loadLibrary();
            } else {
                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('userProfile').classList.add('hidden');
                document.getElementById('mainTabs').classList.add('hidden');
                switchTab('creator');
            }
        });

        document.getElementById('loginBtn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Lỗi đăng nhập: " + err.message));
        };
        document.getElementById('logoutBtn').onclick = () => auth.signOut();

        // 3. TAB LOGIC
        function switchTab(tabName) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
                if(btn.dataset.tab === tabName) btn.classList.add('tab-active');
            });
            if(tabName === 'library') loadLibrary();
        }

        // 4. CREATOR & AI LOGIC
        document.getElementById('loadBtn').onclick = () => {
            const text = document.getElementById('rawInput').value.trim();
            if(!text) return;
            document.getElementById('editor').innerHTML = text.split(/(\s+)/).map(w => 
                w.trim() === '' ? w : `<span class="editor-word" ondblclick="this.classList.toggle('is-bold')">${w}</span>`
            ).join('');
        };

        document.getElementById('generateBtn').onclick = async () => {
            const key = document.getElementById('apiKey').value.trim();
            if(!key) return alert("Vui lòng nhập Gemini API Key!");
            
            const selected = Array.from(new Set(Array.from(document.querySelectorAll('.is-bold')).map(el => 
                el.innerText.trim().replace(/[^a-zA-Z-]/g, '')
            ))).filter(w => w.length > 1);

            if(selected.length === 0) return alert("Double-click để chọn ít nhất 1 từ!");

            document.getElementById('vocabContainer').classList.remove('hidden');
            document.getElementById('vocabList').innerHTML = '<p class="text-center py-10 text-indigo-500 animate-pulse">AI đang xử lý dữ liệu...</p>';
            
            const prompt = `Return a JSON array for: [${selected.join(', ')}]. Structure: {"word": "string", "ipa": "string", "vn": "tiếng Việt", "level": "A1-C2", "example": "English sentence"}.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const cleanJson = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                learningData = JSON.parse(cleanJson);
                renderVocabList();
                saveToFirebase(learningData);
            } catch (e) { alert("Lỗi kết nối AI. Kiểm tra API Key của bạn."); }
        };

        function renderVocabList() {
            document.getElementById('vocabList').innerHTML = learningData.map(item => `
                <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center"><span class="font-black text-slate-800">${item.word}</span><span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded font-bold">${item.level}</span></div>
                    <p class="text-xs text-slate-400 font-mono mb-1">${item.ipa}</p>
                    <p class="text-sm font-bold text-indigo-600">${item.vn}</p>
                </div>
            `).join('');
        }

        // 5. FIREBASE STORAGE
        async function saveToFirebase(data) {
            if(!currentUser) return;
            const batch = db.batch();
            data.forEach(item => {
                const ref = db.collection('users').doc(currentUser.uid).collection('vocabulary').doc(item.word.toLowerCase());
                batch.set(ref, {
                    ...item,
                    correct_count: firebase.firestore.FieldValue.increment(0),
                    incorrect_count: firebase.firestore.FieldValue.increment(0),
                    last_updated: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            });
            await batch.commit();
        }

        async function loadLibrary() {
            if(!currentUser) return;
            const snap = await db.collection('users').doc(currentUser.uid).collection('vocabulary').get();
            const list = snap.docs.map(doc => doc.data());
            
            document.getElementById('libraryTableBody').innerHTML = list.map(item => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="py-4 px-4 font-black text-slate-800">${item.word}</td>
                    <td class="py-4 px-4 text-sm">${item.vn}</td>
                    <td class="py-4 px-4">
                        <div class="w-24 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-emerald-500" style="width: ${Math.min((item.correct_count || 0) * 10, 100)}%"></div>
                        </div>
                    </td>
                    <td class="py-4 px-4 text-xs font-bold">${(item.correct_count >= 10) ? '✅ MASTERED' : '📖 LEARNING'}</td>
                </tr>
            `).join('');

            const mastered = list.filter(i => i.correct_count >= 10).length;
            document.getElementById('libraryStats').innerHTML = `
                <div class="bg-white p-6 rounded-2xl border text-center"><p class="text-xs font-bold text-slate-400 uppercase">Tổng số từ</p><h3 class="text-3xl font-black">${list.length}</h3></div>
                <div class="bg-emerald-50 p-6 rounded-2xl border-emerald-100 border text-center"><p class="text-xs font-bold text-emerald-500 uppercase">Đã thuộc</p><h3 class="text-3xl font-black text-emerald-600">${mastered}</h3></div>
                <div class="bg-indigo-50 p-6 rounded-2xl border-indigo-100 border text-center"><p class="text-xs font-bold text-indigo-500 uppercase">Đang học</p><h3 class="text-3xl font-black text-indigo-600">${list.length - mastered}</h3></div>
            `;
        }

        // 6. CSV EXPORT (FIXED)
        document.getElementById('downloadBtn').onclick = () => {
            if(learningData.length === 0) return;
            let csv = "\uFEFFTừ vựng,Phiên âm,Định nghĩa,Cấp độ,Ví dụ\n";
            learningData.forEach(i => {
                csv += `"${i.word}","${i.ipa}","${i.vn}","${i.level}","${i.example.replace(/"/g, '""')}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `VocaFlow_${new Date().getTime()}.csv`;
            link.click();
        };

        // 7. DRAG & DROP WITH SCORING (FIXED)
        document.getElementById('showDragDropBtn').onclick = () => {
            document.getElementById('vocabContainer').classList.add('hidden');
            document.getElementById('dragDropContainer').classList.remove('hidden');
            document.getElementById('dragDropScoreDisplay').innerHTML = ""; // Reset score

            const shuffledWords = shuffle([...learningData]);
            document.getElementById('draggableContainer').innerHTML = shuffledWords.map(item => 
                `<div class="draggable-item" draggable="true" ondragstart="event.dataTransfer.setData('text','${item.word}')">${item.word}</div>`
            ).join('');

            document.getElementById('quizSentences').innerHTML = shuffle([...learningData]).map((item, i) => {
                const display = item.example.replace(new RegExp(item.word, 'gi'), `<div class="drop-zone" data-answer="${item.word}"></div>`);
                return `<div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-800 text-slate-300 text-lg leading-relaxed"><span class="text-slate-600 font-black mr-4">${i+1}</span>${display}</div>`;
            }).join('');
            setupDragEvents();
        };

        function setupDragEvents() {
            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.ondragover = (e) => e.preventDefault();
                zone.ondrop = (e) => {
                    e.preventDefault();
                    zone.innerText = e.dataTransfer.getData('text');
                    zone.style.background = "#4338ca";
                    zone.style.color = "white";
                };
            });
        }

        document.getElementById('checkDragDropBtn').onclick = () => {
            const zones = document.querySelectorAll('.drop-zone');
            let correct = 0;
            zones.forEach(zone => {
                const isCorrect = zone.innerText.trim().toLowerCase() === zone.dataset.answer.toLowerCase();
                if(isCorrect) {
                    correct++;
                    zone.style.borderColor = "#10b981";
                    zone.style.background = "#064e3b";
                } else {
                    zone.style.borderColor = "#ef4444";
                    zone.style.background = "#450a0a";
                    zone.innerHTML += ` <span class="text-[10px] opacity-50">[${zone.dataset.answer}]</span>`;
                }
            });
            const percent = Math.round((correct/zones.length)*100);
            document.getElementById('dragDropScoreDisplay').innerHTML = `
                <div class="p-4 rounded-xl bg-white/10 text-center border border-white/20">
                    <p class="text-emerald-400 font-black">KẾT QUẢ: ${correct}/${zones.length} (${percent}%)</p>
                </div>
            `;
        };

        // 8. SMART REVIEW MODE (4 OPTIONS)
        async function startReviewQuiz() {
            const snap = await db.collection('users').doc(currentUser.uid).collection('vocabulary')
                                 .where('correct_count', '<', 10).limit(10).get();
            reviewPool = snap.docs.map(doc => doc.data());
            if(reviewPool.length < 4) return alert("Cần ít nhất 4 từ đang học để tạo trắc nghiệm!");
            
            reviewPool = shuffle(reviewPool);
            currentReviewIdx = 0;
            document.getElementById('reviewStart').classList.add('hidden');
            document.getElementById('reviewQuizArea').classList.remove('hidden');
            showReviewQuestion();
        }

        function showReviewQuestion() {
            if(currentReviewIdx >= reviewPool.length) {
                alert("Hoàn thành lượt ôn tập!");
                switchTab('library');
                return;
            }
            const target = reviewPool[currentReviewIdx];
            document.getElementById('qWord').innerText = target.word;
            document.getElementById('qIpa').innerText = target.ipa;
            document.getElementById('reviewProgress').style.width = `${(currentReviewIdx/reviewPool.length)*100}%`;

            const distractors = shuffle(reviewPool.filter(i => i.word !== target.word)).slice(0, 3).map(i => i.vn);
            const choices = shuffle([target.vn, ...distractors]);
            
            document.getElementById('qChoices').innerHTML = choices.map(c => `
                <button onclick="checkReviewAnswer('${c}', '${target.vn}', '${target.word}')" 
                    class="p-5 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 hover:border-indigo-500 hover:bg-indigo-50 transition text-left">
                    ${c}
                </button>
            `).join('');
        }

        async function checkReviewAnswer(selected, correct, word) {
            const ref = db.collection('users').doc(currentUser.uid).collection('vocabulary').doc(word.toLowerCase());
            if(selected === correct) {
                await ref.update({ correct_count: firebase.firestore.FieldValue.increment(1) });
                currentReviewIdx++;
            } else {
                alert("Chưa đúng! Đáp án là: " + correct);
                await ref.update({ incorrect_count: firebase.firestore.FieldValue.increment(1) });
                const item = reviewPool.splice(currentReviewIdx, 1)[0];
                reviewPool.push(item); // Đố lại sau
            }
            showReviewQuestion();
        }

        // UTILS
        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
        function closeDragDrop() { document.getElementById('dragDropContainer').classList.add('hidden'); document.getElementById('vocabContainer').classList.remove('hidden'); }
    </script>
</body>
</html>
